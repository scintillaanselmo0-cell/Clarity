<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity — Connessione Google Analytics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0F1E;
    color: #F5F0E8;
    font-family: 'DM Sans', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
  }
  .box {
    max-width: 340px;
  }
  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #4F46E5, #D4A853);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: monospace; font-size: 14px; color: white;
    margin: 0 auto 20px;
  }
  h2 { font-size: 20px; margin-bottom: 8px; }
  p { font-size: 14px; color: rgba(245,240,232,0.5); line-height: 1.6; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(79,70,229,0.2);
    border-top-color: #4F46E5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 20px auto 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { color: #5DCAA5; font-size: 40px; margin-bottom: 12px; }
  .error { color: #F87171; font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">C/</div>
  <div id="content">
    <h2>Connessione in corso…</h2>
    <p>Stiamo completando l'autorizzazione con Google Analytics.</p>
    <div class="spinner"></div>
  </div>
</div>

<script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const content = document.getElementById('content');

    if (error || !code) {
      content.innerHTML = `
        <div class="error">✕</div>
        <h2>Autorizzazione negata</h2>
        <p>Non hai autorizzato l'accesso a Google Analytics.<br>Puoi chiudere questa finestra e riprovare.</p>
      `;
      return;
    }

    // Invia il codice alla finestra parent (dashboard)
    if (window.opener) {
      window.opener.postMessage({ code, state }, 'https://scintillaanselmo0-cell.github.io');
      content.innerHTML = `
        <div class="success">✓</div>
        <h2>Google Analytics connesso!</h2>
        <p>Questa finestra si chiuderà automaticamente.</p>
      `;
      setTimeout(() => window.close(), 2000);
    } else {
      // Fallback: nessuna finestra parent
      content.innerHTML = `
        <div class="success">✓</div>
        <h2>Autorizzazione completata</h2>
        <p>Puoi chiudere questa finestra e tornare alla dashboard.</p>
      `;
    }
  })();
</script>
</body>
</html>

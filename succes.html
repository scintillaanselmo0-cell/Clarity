<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity — Pagamento completato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0F1E;
    color: #F5F0E8;
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .box {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #4F46E5, #D4A853);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: monospace; font-size: 16px; color: white;
    margin: 0 auto 32px;
  }
  .check {
    width: 72px; height: 72px;
    background: rgba(93,202,165,0.15);
    border: 2px solid rgba(93,202,165,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 0 auto 24px;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  p {
    font-size: 15px;
    color: rgba(245,240,232,0.5);
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-block;
    padding: 14px 32px;
    background: #4F46E5;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .plan-badge {
    display: inline-block;
    padding: 6px 16px;
    background: rgba(79,70,229,0.15);
    border: 1px solid rgba(79,70,229,0.3);
    border-radius: 100px;
    font-size: 13px;
    color: #6366F1;
    margin-bottom: 24px;
  }
</style>
</head>
<body>
<div class="box">
  <div class="logo">C/</div>
  <div class="check">✓</div>
  <div class="plan-badge" id="plan-badge">Piano attivato</div>
  <h1>Benvenuto su Clarity!</h1>
  <p>Il tuo pagamento è andato a buon fine. Il tuo piano è attivo e domani mattina alle 7:00 riceverai il tuo primo briefing personalizzato.</p>
  <a href="dashboard.html" class="btn">Vai alla dashboard →</a>
</div>

<script>
  const SUPABASE_URL = 'https://zkxjmelmikohlwbypiwn.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpreGptZWxtaWtvaGx3YnlwaXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjAwMzEsImV4cCI6MjA5NDQzNjAzMX0.8SAIhXQsZ63yRv05uoXQQJ83DparA7r6R6BHZdmLVV4';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  (async function() {
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan') || 'starter';
    const billing = params.get('billing') || 'monthly';

    const planLabel = plan === 'pro' ? 'Clarity Pro' : 'Clarity Starter';
    const billingLabel = billing === 'annual' ? 'annuale' : 'mensile';
    document.getElementById('plan-badge').textContent = `${planLabel} · ${billingLabel}`;

    // Aggiorna il piano su Supabase
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      await sb.from('users').update({
        plan: plan,
        billing: billing,
        plan_activated_at: new Date().toISOString()
      }).eq('id', session.user.id);
    }

    // Redirect automatico dopo 5 secondi
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 5000);
  })();
</script>
</body>
</html>
